title:
  ru: "Документация\nкомплекта"
  en_us: "Package\ndocumentation"

tooltip:
  ru: >- 
    Плагин предназначен для создания комплекта документации по заранее подготовленной конфигурации. 
    Для испольования необходимо запустить плагин, найти и выбрать в проводнике подготовленную конфигурацию, отметить нужные листы и нажать Окей.
  en_us: >-
    The plugin is designed to create a documentation set for a pre-prepared configuration.
    To use it, launch the plugin, find and select the pre-prepared configuration in the explorer, select the desired sheets, and click OK.

assembly: RevitPackageDocumentation.dll
command_class: RevitPackageDocumentationCommand

author: DivinN

min_revit_version: 2022
max_revit_version: 2024
