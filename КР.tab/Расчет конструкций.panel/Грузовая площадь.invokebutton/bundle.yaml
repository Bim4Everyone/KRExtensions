title:
  ru: "Грузовая\nплощадь"
  en_us: "Load\narea"

tooltip:
  ru: >- 
    Определяет грузовую площадь пилонов и стен.
    Для запуска: 
    
    1. Перейти на план;
    
    2. Запустите плагин и выберите элементы перекрытия Revit, которые являются одной физической плитой;
    
    3. По выбранным перекрытиям построятся цветовые области по контурам грузовых площадей. Значения площадей будут записаны в параметр "ФОП_Площадь грузовая"
  en_us: >- 
    Determines the loading area of pylons and walls.
    To launch:
    
    1. Open a plan;
    
    2. Run the plugin and select the Revit floor slab elements that form a single physical slab;
    
    3. Filled regions will be generated for the selected slabs based on the contours of the loading areas. The area values will be written to the "ФОП_Площадь грузовая" parameter.

assembly: RevitPylonLoadAreas.dll
command_class: FindPylonLoadAreasCommand

author: vlastroG

min_revit_version: 2022
max_revit_version: 2024
