title:
  ru: "Толщина\nБИО"
  en_us: "Landscape\nthickness"

tooltip:
  ru: >- 
    Определяет усредненную толщину слоя БИО по грузовым площадям пилонов.
    Для запуска: 
    
    1. Перейти на план;
    
    2. Запустите плагин и выберите файл LandXML;
    
    3. По каждой грузовой площади пилона будет рассчитана усредненная толщина слоя БИО, которая будет записана в параметр "ФОП_Толщина БИО".
  en_us: >- 
    Determines the average thickness of the bio-layer for the pylon loading areas.
    To launch:
    
    1. Go to the plan;
    
    2. Run the plugin and select the LandXML file;
    
    3. The average bio-layer thickness will be calculated for each pylon loading area and saved to the "ФОП_Толщина БИО" parameter.

assembly: RevitPylonLoadAreas.dll
command_class: GetLandThicknessOnLoadAreaCommand

author: vlastroG

min_revit_version: 2022
max_revit_version: 2024
